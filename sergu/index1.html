<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ecommerce website</title>
    <link rel="stylesheet" href="./styles1.css" />
  </head>
  <body>
    <main>
      <header">
        <div class="Bar">
            <img class="HomeButton" src="./HomeButton.png" onclick='homebutton()'>
            <img class="One" src="./add.png" onclick='add()'>
      </header>
      <section id="input">
        <form>
            <label for="inputName">Name:</label><br>
            <input id="input-name" type="text" name="productName"/><br>
            <label for="inputPrice">Price:</label> <br>
            <input id="input-price" type="number" name="productPrice"/><br>
            <label for="inputPicture">Picture:</label><br>
            <input id="input-picture" type="text" name="productPhoto"><br>
            <label for="inputInfo">Info:</label><br>
            <input id="input-Info" type="text" name="productDescription"><br>
            <label for="inputLocation">Location:</label> <br>
            <input id="input-location" type="text" name="productLocation"><br><br>
            <button id="submit" type="submit">Submit</button>
        </form>
      </section>
    <script src="./script1.js"></script>
</main>
</body>
</html>
